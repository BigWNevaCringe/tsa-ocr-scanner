name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            librsvg2-dev patchelf build-essential curl wget file libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps
        run: bun install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Normalize Windows installer name
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          $installer = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter "*_x64-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows setup installer not found"
          }
          Copy-Item $installer.FullName dist-release/LH-TSA-Scan-Watcher-x64-setup.exe

      - name: Normalize Linux package name
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p dist-release
          installer="$(find src-tauri/target/release/bundle -type f -name '*_amd64.deb' | head -n 1)"
          if [ -z "$installer" ]; then
            echo "Linux deb package not found" >&2
            exit 1
          fi
          cp "$installer" dist-release/LH-TSA-Scan-Watcher-amd64.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**

      - name: Upload installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/*
